<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ROOT@GABRIEL-FONTANA:~#</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #terminal {
            width: 80%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ff41;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            min-height: 300px;
        }
        .line { margin-bottom: 5px; min-height: 1.2em; }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: #00ff41;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .highlight { color: #fff; text-shadow: 0 0 5px #00ff41; }
    </style>
</head>
<body>

    <div id="terminal">
        <div id="output"></div>
        <span class="cursor"></span>
    </div>

    <script>
        const output = document.getElementById('output');
        const lines = [
            "> INITIALIZING DEVOPS_KERNEL_V3...",
            "> LOADING MODULES: [DOCKER, NGINX, BASH]",
            "> CONNECTING TO REPOSITORY: devops-labs...",
            "> AUTHENTICATING USER: GABRIEL FONTANA",
            "> ACCESS GRANTED.",
            "> ---------------------------------------",
            "> STATUS: <span class='highlight'>SYSTEM OPERATIONAL</span>",
            "> UPTIME: 99.99%",
            "> WELCOME TO THE MATRIX, ROOT."
        ];

        let lineIndex = 0;

        function typeLine() {
            if (lineIndex < lines.length) {
                let div = document.createElement('div');
                div.className = 'line';
                div.innerHTML = lines[lineIndex];
                output.appendChild(div);
                lineIndex++;
                setTimeout(typeLine, 800); // Velocidade de cada linha
            }
        }

        // Inicia a simulação de digitação
        window.onload = typeLine;
    </script>
</body>
</html>
